name: wildfire-watershed-clustering
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.10

  # Core scientific computing
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scipy>=1.10.0

  # Geospatial libraries (better via conda)
  - geopandas>=0.13.0
  - rasterio>=1.3.0
  - fiona>=1.9.0
  - shapely>=2.0.0
  - pyproj>=3.5.0
  - gdal>=3.6.0
  - cartopy>=0.21.0

  # Machine learning and clustering
  - scikit-learn>=1.3.0

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - plotly>=5.15.0
  - folium>=0.14.0
  - contextily>=1.3.0

  # Parallel processing
  - joblib>=1.3.0
  - dask>=2023.5.0

  # Development and testing
  - pytest>=7.4.0
  - jupyter>=1.0.0
  - notebook>=7.0.0
  - ipykernel>=6.25.0

  # Progress bars and utilities
  - tqdm>=4.65.0
  - pyyaml>=6.0
  - python-dotenv>=1.0.0

  # Optional: GPU acceleration (uncomment if needed)
  # - cupy
  # - rapids

  # Pip dependencies (packages not available via conda or better via pip)
  - pip
  - pip:
    # Google Earth Engine (pip only)
    - earthengine-api>=0.1.350
    - geemap>=0.24.0
    
    # Additional pip-only packages
    - multiprocessing-logging>=0.3.4
    
    # Optional: Development tools
    - black
    - flake8
    - isort